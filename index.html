<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カウントダウンタイマー</title>

<style>
    body {
        margin: 0;
        padding: 0px;
        display: flex;
        justify-content: center;
        background: transparent;
    }

    .timer-container {
        background: #001e32;
        border-radius: 10px;
        padding: 0px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
    }

    .timer-header {
        margin-bottom: 0px;
        font-size: 18px;
        font-weight: bold;
        color: #ffffff;

    }

    .timer-header img {
    max-width: 100%;
    height: 10px;
    display: block;
}

    .timer-box {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1px;
    }

    .timer-box img {
        width: 25px;
        height: 50px;
        vertical-align: middle;
    }

    .colon img {
        width: 10px;
        height: 50px;
    }
    
</style>
</head>

<body>

<div class="timer-container">

    <div class="timer-header">
    <img src="https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-658x111_v-fs_webp_28360654-a736-48cb-93b5-9ca65910aa86.png">
</div>

    <div class="timer-box" id="countdown-timer"></div>

</div>

<script>
const endDate = new Date('2026-05-02T20:55:00').getTime();
const timerBox = document.getElementById('countdown-timer');

const imageUrls = {
    '0': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-50x100_webp_d880ea68-53c5-40bf-a733-293c2e11e3c1.png',
    '1': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-50x100_webp_56b2b2ff-6a52-46c1-b339-f4da77aeca13.png',
    '2': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-50x100_webp_0b37becc-3ef4-4bc5-9608-a0f52700a8bf.png',
    '3': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-50x100_webp_eb751902-6f42-4ef6-b480-77f1050cb9eb.png',
    '4': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-50x100_webp_a4cd4914-1e3e-4987-b695-5ab10548a55a.png',
    '5': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-50x100_webp_457a53cb-7de2-425c-97ed-50a8754a2c1e.png',
    '6': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-50x100_webp_d2406ebb-64cb-4797-8a3d-de70252ed0bb.png',
    '7': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-50x100_webp_9ea23de6-4b87-4d78-a6e7-115e5bbfd43a.png',
    '8': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-50x100_webp_dd15c24d-9d8e-43ac-bce5-2210b7ccad44.png',
    '9': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-50x100_webp_62d4b56f-6256-4323-b796-511269c9bedb.png',
    'day': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-50x100_webp_23c1bec2-e4ad-40a0-9cf6-f0f4ca1ffb6f.png',
    'colon': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-20x100_webp_1668352f-0ba4-4174-9567-568a59fa6f2a.png',
    'end': 'https://storage.googleapis.com/studio-design-asset-files/projects/BXaxZe8MO7/s-500x100_webp_afac8b5d-44b7-442a-b58e-472a14c5cec2.png'
};

function getRemainingTime(endTime) {
    const now = new Date().getTime();
    const distance = endTime - now;

    if (distance < 0) return null;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    return { days, hours, minutes, seconds };
}

function applyColorFilter() {
    const now = new Date().getTime();
    const distance = endDate - now;

    if (distance >= 0) {
        const { days, hours, minutes } = getRemainingTime(endDate);

        if (days === 0 && hours === 0 && minutes < 60) {
            const timerImages = document.querySelectorAll('.timer-box img:not([alt="解答締切"])');
            timerImages.forEach(img => {
                img.style.filter = 'grayscale(100%) brightness(0.6) sepia(100%) hue-rotate(285deg) saturate(800%) contrast(75%)';
            });
        }
    }
}

function updateTimer() {
    const time = getRemainingTime(endDate);

    if (!time) {
        timerBox.innerHTML = `<img src="${imageUrls['end']}" alt="解答締切" style="width: 250px; height: 50px;">`;
        return;
    }

    const dayImages = String(time.days).padStart(2, '0').split('').map(num => `<img src="${imageUrls[num]}">`).join('') + `<img src="${imageUrls['day']}">`;
    const hourImages = String(time.hours).padStart(2, '0').split('').map(num => `<img src="${imageUrls[num]}">`).join('');
    const minuteImages = String(time.minutes).padStart(2, '0').split('').map(num => `<img src="${imageUrls[num]}">`).join('');
    const secondImages = String(time.seconds).padStart(2, '0').split('').map(num => `<img src="${imageUrls[num]}">`).join('');

    /* ▼ スペース完全削除して詰める */
    timerBox.innerHTML =
        `${dayImages}${hourImages}` +
        `<span class="colon"><img src="${imageUrls['colon']}"></span>` +
        `${minuteImages}` +
        `<span class="colon"><img src="${imageUrls['colon']}"></span>` +
        `${secondImages}`;

    applyColorFilter();
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
